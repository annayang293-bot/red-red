# Reusable workflow: invoked by callers (cron-daily, on-demand-run) to execute one pipeline run.
#
# Why reusable: keeps Python install / dependency / env wiring DRY across triggers. New triggers
# (e.g. PR check, weekly digest) only need to write a thin caller; install + run steps are owned
# here. Secret-bearing inputs are passed via `secrets: inherit` from the caller (so we don't
# duplicate the secret list in two files).
#
# Contract: matches `python -m pipeline.run_once <topic> --triggered-by <triggered_by>` (see
# pipeline/run_once.py). Exit code 0 on success, non-zero on pipeline failure → the run is
# visible as a red ✗ in GH Actions UI.
name: _Run pipeline (reusable)

on:
  workflow_call:
    inputs:
      topic:
        description: Topic keyword to run (e.g. "AI 创业").
        required: true
        type: string
      triggered_by:
        description: 'Source label written to runs.triggered_by; one of "manual" or "cron".'
        required: true
        type: string
    # Caller passes secrets via `secrets: inherit`; we still declare them so the workflow_call
    # surface is explicit and self-documenting.
    secrets:
      SUPABASE_URL:
        required: true
      SUPABASE_SECRET_KEY:
        required: true
      OPENAI_API_KEY:
        required: true
      REDDIT_USER_AGENT:
        required: true
      APIFY_TOKEN:
        # required since 2026-05-31 — RedditSource defaults to auth_mode: apify, which calls
        # the harshmaur/reddit-scraper actor over the Apify REST API. Missing token surfaces
        # downstream as a Python RuntimeError → `failed_sources` → run_once exits 1.
        required: true

# Defense-in-depth lockdowns (Rex Phase 1, 2026-05-31):
#  - permissions: lock GITHUB_TOKEN to read-only (we only checkout; no push / no PR / no release).
#  - concurrency.group: serialize runs of the same topic across cron + manual dispatch so a slow
#    cron + a follow-up manual click don't both write a duplicate run to Supabase. cancel-in-progress
#    is false so the second dispatch queues behind the first instead of canceling it (we'd rather
#    burn 25s of runner time than swallow a user-initiated click).
permissions:
  contents: read

concurrency:
  group: pipeline-${{ inputs.topic }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        # CRITICAL: inputs.topic comes from a public, unauthenticated /api/run endpoint. Routing
        # ${{ inputs.* }} directly into a `run:` block would let an attacker break out of the
        # quoted string and execute arbitrary shell on the runner (catastrophic post-A2: that
        # runner is Anna's laptop). The fix is the GitHub-recommended env-indirection pattern —
        # `${{ ... }}` is expanded into env vars at compile time, then the shell sees only the
        # `"$VAR"` syntax, which it parses as a normal parameter expansion (no template
        # injection). The /api/run handler ALSO regex-validates topic before dispatching — both
        # layers must be in place.
        # See: https://github.blog/security/supply-chain-security/four-tips-to-keep-your-github-actions-workflows-secure/
        env:
          TOPIC: ${{ inputs.topic }}
          TRIGGERED_BY: ${{ inputs.triggered_by }}
        run: |
          set -o pipefail
          python -m pipeline.run_once "$TOPIC" --triggered-by "$TRIGGERED_BY" \
            | tee /tmp/run_once_out.json

      - name: Summarize result
        if: always()
        run: |
          if [ -s /tmp/run_once_out.json ]; then
            {
              echo "### Pipeline result"
              echo
              echo '```json'
              tail -n 1 /tmp/run_once_out.json
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
