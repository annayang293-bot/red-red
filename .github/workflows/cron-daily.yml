# Daily pipeline run — triggered by VERCEL CRON, not GitHub's own scheduler.
#
# 2026-06-15: removed the GitHub `schedule:` trigger. GitHub Actions cron is best-effort and
# routinely delayed / dropped under load — on 2026-06-15 the 16:00 UTC run simply never fired.
# The reliable trigger is now Vercel Cron (`web/vercel.json` crons → `web/pages/api/cron/daily.ts`),
# which fires daily at 16:00 UTC and dispatches THIS workflow via the REST API. We must NOT keep
# both triggers — that would run the pipeline twice a day (double Apify cost).
#
# Topic is hard-coded here (dispatch carries no inputs). If the active topic changes, update this
# file (or move to a config-driven trigger, e.g. reading topics.active from DB).
name: Cron — daily pipeline

on:
  # Dispatched by Vercel Cron (see above) and usable manually from the GH Actions UI for ops.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run:
    uses: ./.github/workflows/_run-pipeline.yml
    with:
      topic: 'AI 创业'
      triggered_by: cron
    secrets: inherit
